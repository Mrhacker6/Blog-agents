<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina AI - YouTube Blog Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="bg"></div>
<header class="hero">
<h1>Lumina AI</h1>
<p>Generate SEO-ready technical blogs from any YouTube channel using CrewAI + FastAPI.</p>
</header>

<main class="grid">
<section class="panel">
<h2>Generate Blog</h2>

<label>YouTube Channel URL</label>
<input id="channel" placeholder="https://youtube.com/@channel">

<label>Blog Topic</label>
<input id="topic" placeholder="LLM Security">

<button id="generate">⚡ Generate Blog</button>

<div id="status" class="status hidden">
<div class="bar"><div id="fill"></div></div>
<p id="statusText">Initializing agents...</p>
</div>

<div id="error"></div>
</section>

<section class="panel output">
<div class="toolbar">
<h2>Generated Blog</h2>
<div>
<button id="copy">Copy</button>
<a id="download">Download</a>
</div>
</div>
<div id="blog" class="markdown">
<p>Your generated blog will appear here.</p>
</div>
</section>
</main>

<footer>
Powered by CrewAI • FastAPI • Gemini
</footer>

<script src="/static/script.js"></script>
</body>
</html>
